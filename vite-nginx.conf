server {
    listen 80;
    root /usr/share/nginx/html;

    # Prevent protocol-downgrade redirects
    absolute_redirect off;
    port_in_redirect off;

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA Main - NO $uri/ to prevent the trailing-slash 301 redirect
    location /fitness {
        alias /usr/share/nginx/html/fitness;
        # CRITICAL: Do NOT use $uri/ here - it causes the http:// redirect
        try_files $uri /fitness/index.html;
    }

    # Redirect root to /fitness
    location = / {
        return 301 /fitness;
    }

    error_page 404 /fitness/index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
